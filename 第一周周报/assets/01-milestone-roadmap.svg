<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e5eef7"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2742"/>
      <stop offset="1" stop-color="#123c56"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }
      .title { font-size: 50px; font-weight: 800; fill: #102033; }
      .sub { font-size: 22px; fill: #536579; }
      .phase { font-size: 30px; font-weight: 800; fill: #f8fafc; }
      .body { font-size: 20px; fill: #dbeafe; }
      .tiny { font-size: 17px; fill: #475569; }
      .card { fill: url(#ink); rx: 24; filter: url(#soft); }
      .pin { fill: #38bdf8; stroke: #f8fafc; stroke-width: 5; }
      .rail { stroke: #1e3a5f; stroke-width: 8; stroke-linecap: round; }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 10; }
    </style>
  </defs>
  <rect width="1600" height="760" fill="url(#paper)"/>
  <path d="M0 650 C230 560 420 720 660 610 C900 500 1110 675 1600 520 L1600 760 L0 760 Z" fill="#dbeafe" opacity="0.65"/>
  <text x="80" y="92" class="title">第一周里程碑路线图</text>
  <text x="82" y="132" class="sub">从最小 C++ 工程骨架推进到可演示、可测试、可扩展的终端 AI Agent</text>
  <line x1="155" y1="362" x2="1445" y2="362" class="rail"/>
  <line x1="155" y1="430" x2="1445" y2="430" class="dash"/>

  <g transform="translate(80,210)">
    <rect class="card" width="260" height="170"/>
    <text x="28" y="55" class="phase">M0-M1</text>
    <text x="28" y="92" class="body">工程骨架</text>
    <text x="28" y="124" class="body">LLM 接入</text>
    <text x="28" y="202" class="tiny">2026-07-06 上午</text>
  </g>
  <circle cx="210" cy="362" r="20" class="pin"/>

  <g transform="translate(385,210)">
    <rect class="card" width="260" height="170"/>
    <text x="28" y="55" class="phase">M2-M3</text>
    <text x="28" y="92" class="body">工具注册表</text>
    <text x="28" y="124" class="body">AgentLoop 闭环</text>
    <text x="28" y="202" class="tiny">2026-07-06 下午</text>
  </g>
  <circle cx="515" cy="362" r="20" class="pin"/>

  <g transform="translate(690,210)">
    <rect class="card" width="260" height="170"/>
    <text x="28" y="55" class="phase">M4-M5</text>
    <text x="28" y="92" class="body">权限与日志</text>
    <text x="28" y="124" class="body">演示交付</text>
    <text x="28" y="202" class="tiny">2026-07-06 至 07</text>
  </g>
  <circle cx="820" cy="362" r="20" class="pin"/>

  <g transform="translate(995,210)">
    <rect class="card" width="260" height="170"/>
    <text x="28" y="55" class="phase">M6-M7</text>
    <text x="28" y="92" class="body">Web 搜索</text>
    <text x="28" y="124" class="body">MCP 最小客户端</text>
    <text x="28" y="202" class="tiny">2026-07-07 至 09</text>
  </g>
  <circle cx="1125" cy="362" r="20" class="pin"/>

  <g transform="translate(1260,210)">
    <rect class="card" width="260" height="170"/>
    <text x="28" y="55" class="phase">M8</text>
    <text x="28" y="92" class="body">工程稳定</text>
    <text x="28" y="124" class="body">双端同步</text>
    <text x="28" y="202" class="tiny">2026-07-09 至 10</text>
  </g>
  <circle cx="1390" cy="362" r="20" class="pin"/>

  <g transform="translate(115,525)">
    <text class="tiny">核心闭环：CMake / vcpkg / LLM / tools / permissions / JSONL</text>
    <text y="38" class="tiny">扩展能力：Skill / Web Search / MCP / AGENTS.md / SSE streaming</text>
    <text y="76" class="tiny">演示保障：slash command palette / history load / VS generator / GitHub + GitLab sync</text>
  </g>
</svg>

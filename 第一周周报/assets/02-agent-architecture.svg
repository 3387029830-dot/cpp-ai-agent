<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f2f3a"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }
      .title { font-size: 50px; font-weight: 800; fill: #f8fafc; }
      .sub { font-size: 22px; fill: #b9c7d8; }
      .box { fill: rgba(248,250,252,0.08); stroke: rgba(203,213,225,0.35); stroke-width: 2; rx: 22; filter: url(#cardShadow); }
      .core { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 3; rx: 26; filter: url(#cardShadow); }
      .coreText { font-size: 36px; font-weight: 800; fill: #0f172a; }
      .label { font-size: 26px; font-weight: 800; fill: #f8fafc; }
      .small { font-size: 19px; fill: #cbd5e1; }
      .darkSmall { font-size: 20px; fill: #1e293b; }
      .arrow { stroke: #67e8f9; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrowMuted); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="80" y="92" class="title">Agent 系统结构图</text>
  <text x="82" y="132" class="sub">围绕 AgentLoop 组织模型、工具、安全、日志、MCP 与项目规范</text>

  <rect x="650" y="390" width="300" height="150" class="core"/>
  <text x="710" y="452" class="coreText">AgentLoop</text>
  <text x="702" y="494" class="darkSmall">思考 → 行动 → 观察</text>

  <rect x="100" y="230" width="310" height="145" class="box"/>
  <text x="140" y="282" class="label">Console UI</text>
  <text x="140" y="320" class="small">命令面板 / 流式输出</text>

  <rect x="100" y="605" width="310" height="145" class="box"/>
  <text x="140" y="657" class="label">AGENTS.md</text>
  <text x="140" y="695" class="small">项目级规范注入</text>

  <rect x="505" y="165" width="310" height="145" class="box"/>
  <text x="545" y="217" class="label">LlmClient</text>
  <text x="545" y="255" class="small">OpenAI-compatible / SSE</text>

  <rect x="960" y="165" width="330" height="145" class="box"/>
  <text x="1000" y="217" class="label">ToolRegistry</text>
  <text x="1000" y="255" class="small">tools schema / 工具查找</text>

  <rect x="1060" y="390" width="360" height="150" class="box"/>
  <text x="1100" y="445" class="label">PermissionManager</text>
  <text x="1100" y="483" class="small">Safe / Write / Dangerous</text>

  <rect x="960" y="640" width="330" height="145" class="box"/>
  <text x="1000" y="692" class="label">JsonLogger</text>
  <text x="1000" y="730" class="small">history / replay / load</text>

  <rect x="505" y="705" width="310" height="145" class="box"/>
  <text x="545" y="757" class="label">SkillCatalog</text>
  <text x="545" y="795" class="small">工作模式 / 工具白名单</text>

  <rect x="1180" y="795" width="310" height="120" class="box"/>
  <text x="1220" y="845" class="label">MCP Server</text>
  <text x="1220" y="883" class="small">stdio external tools</text>

  <path d="M410 300 C500 330 560 390 650 430" class="arrow"/>
  <path d="M255 605 C390 520 510 480 650 465" class="muted"/>
  <path d="M690 310 C720 350 750 370 780 390" class="arrow"/>
  <path d="M960 255 C905 315 860 350 835 390" class="arrow"/>
  <path d="M950 465 L1060 465" class="arrow"/>
  <path d="M950 505 C1010 565 1065 600 1110 640" class="muted"/>
  <path d="M760 540 C720 610 690 660 675 705" class="muted"/>
  <path d="M1290 795 C1220 705 1190 620 1220 540" class="arrow"/>

  <g transform="translate(100,850)">
    <text class="small">核心说明：模型不直接操作文件，所有本地动作都通过 ToolRegistry 和 PermissionManager 受控执行。</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f7f4ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#334155" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }
      .title { font-size: 50px; font-weight: 800; fill: #14213d; }
      .sub { font-size: 22px; fill: #526070; }
      .lane { fill: rgba(255,255,255,0.75); stroke: #d6dee8; stroke-width: 2; rx: 28; filter: url(#shadow); }
      .step { fill: #14213d; rx: 18; }
      .step2 { fill: #0f766e; rx: 18; }
      .step3 { fill: #b45309; rx: 18; }
      .step4 { fill: #1d4ed8; rx: 18; }
      .num { font-size: 30px; font-weight: 900; fill: #ffffff; }
      .label { font-size: 25px; font-weight: 800; fill: #172033; }
      .body { font-size: 18px; fill: #5b6b7d; }
      .white { font-size: 19px; fill: #e2e8f0; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="92" class="title">阶段演示路线</text>
  <text x="82" y="132" class="sub">把零散命令组织成一条可讲述的项目故事</text>

  <rect x="80" y="190" width="1440" height="560" class="lane"/>
  <g transform="translate(140,260)">
    <rect width="180" height="96" class="step"/>
    <text x="24" y="60" class="num">01</text>
    <text x="0" y="142" class="label">项目定位</text>
    <text x="0" y="176" class="body">C++17 终端 AI Agent</text>
  </g>
  <path d="M330 310 L430 310" class="arrow"/>

  <g transform="translate(445,260)">
    <rect width="180" height="96" class="step2"/>
    <text x="24" y="60" class="num">02</text>
    <text x="0" y="142" class="label">核心闭环</text>
    <text x="0" y="176" class="body">LLM + tools + permissions</text>
  </g>
  <path d="M635 310 L735 310" class="arrow"/>

  <g transform="translate(750,260)">
    <rect width="180" height="96" class="step3"/>
    <text x="24" y="60" class="num">03</text>
    <text x="0" y="142" class="label">功能入口</text>
    <text x="0" y="176" class="body">输入 / 打开命令面板</text>
  </g>
  <path d="M940 310 L1040 310" class="arrow"/>

  <g transform="translate(1055,260)">
    <rect width="180" height="96" class="step4"/>
    <text x="24" y="60" class="num">04</text>
    <text x="0" y="142" class="label">工具演示</text>
    <text x="0" y="176" class="body">read / write / run</text>
  </g>
  <path d="M1245 310 C1340 320 1370 405 1300 480" class="arrow"/>

  <g transform="translate(1085,525)">
    <rect width="180" height="96" class="step2"/>
    <text x="24" y="60" class="num">05</text>
    <text x="0" y="142" class="label">Web + MCP</text>
    <text x="0" y="176" class="body">搜索与外部工具协议</text>
  </g>
  <path d="M1075 575 L975 575" class="arrow"/>

  <g transform="translate(775,525)">
    <rect width="180" height="96" class="step3"/>
    <text x="24" y="60" class="num">06</text>
    <text x="0" y="142" class="label">工程稳定</text>
    <text x="0" y="176" class="body">AGENTS.md / VS generator</text>
  </g>
  <path d="M765 575 L665 575" class="arrow"/>

  <g transform="translate(465,525)">
    <rect width="180" height="96" class="step4"/>
    <text x="24" y="60" class="num">07</text>
    <text x="0" y="142" class="label">测试验收</text>
    <text x="0" y="176" class="body">36 doctest 全部通过</text>
  </g>

  <text x="80" y="825" class="sub">建议时长：总览 1 分钟 + 核心闭环 3 分钟 + 扩展能力 3 分钟 + 测试与总结 2 分钟</text>
</svg>

# =============================================================================
# cpp-ai-agent Ansible Inventory
# =============================================================================
# 用法:
#   ansible-playbook -i inventory.ini deploy.yml                  # 部署到 staging
#   ansible-playbook -i inventory.ini deploy.yml -e "target=production"  # 部署到 production

[staging]
# Linux VM — GitLab Runner 所在机器 (自部署)
linux-vm ansible_host=192.168.149.129 ansible_user=deploy

[production]
# 生产环境 — 按需修改
# prod-server-01 ansible_host=192.168.1.200 ansible_user=deploy

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# --------------------------------------------------
# cpp-ai-agent  GitLab CI/CD Pipeline
# --------------------------------------------------
# Runner: Linux VM (shell executor, tag: linux)
# Setup: sudo bash scripts/setup_linux.sh

stages:
  - build
  - test
  - quality
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==================================================
# Linux Jobs (shell executor, tag: linux)
# Runner: 192.168.149.129
# ==================================================

build-linux:
  stage: build
  tags:
    - linux
  before_script:
    - export VCPKG_ROOT=/opt/vcpkg
    - git submodule update --init --recursive 2>/dev/null || true
    - echo "=== Linux Build Environment ==="
    - g++ --version | head -1
    - cmake --version | head -1
    - ninja --version 2>/dev/null || true
  script:
    - echo "=== Configuring CMake (Linux GCC Debug) ==="
    - cmake --preset linux-gcc-debug
    - echo "=== Configuring CMake (Linux GCC Release) ==="
    - cmake --preset linux-gcc-release
    - echo "=== Building Debug ==="
    - cmake --build --preset linux-gcc-debug
    - echo "=== Building Release ==="
    - cmake --build --preset linux-gcc-release
    - echo "=== Collecting artifacts ==="
    - mkdir -p build-output/linux-gcc
    - cp build/linux-gcc-release/ai-agent build-output/linux-gcc/ 2>/dev/null || true
    - cp config/*.json build-output/linux-gcc/ 2>/dev/null || true
    - cp .env.example build-output/linux-gcc/ 2>/dev/null || true
  artifacts:
    name: ai-agent-linux-${CI_COMMIT_SHORT_SHA}
    paths:
      - build-output/
    expire_in: 7 days

test-linux:
  stage: test
  tags:
    - linux
  variables:
    GIT_CLEAN_FLAGS: none
  needs:
    - job: build-linux
      artifacts: false
      optional: true
  script:
    - echo "=== Running CTest ==="
    - cd build/linux-gcc-debug
    - ctest --output-on-failure
  artifacts:
    when: always
    expire_in: 30 days

code-quality:
  stage: quality
  tags:
    - linux
  variables:
    GIT_CLEAN_FLAGS: none
  needs:
    - job: build-linux
      artifacts: false
      optional: true
  script:
    - echo "=== C++ Code Quality Analysis (cppcheck) ==="
    - cppcheck --version
    - mkdir -p quality-report
    - echo "=== Running cppcheck ==="
    - cppcheck --enable=all --inconclusive --xml --xml-version=2 -j$(nproc) src/ 2> quality-report/cppcheck.xml || true
    - cppcheck --enable=all --inconclusive --template=gcc -j$(nproc) src/ 2> quality-report/cppcheck.txt || true
    - echo "=== Generating Code Quality report ==="
    - |
      python3 -c "
      import json, xml.etree.ElementTree as ET
      tree = ET.parse('quality-report/cppcheck.xml')
      root = tree.getroot()
      issues = []
      for error in root.findall('.//error'):
          loc = error.find('location')
          if loc is not None:
              issues.append({
                  'description': error.get('msg', ''),
                  'check_name': 'cppcheck',
                  'fingerprint': f\"{error.get('id')}:{loc.get('file')}:{loc.get('line')}\",
                  'severity': 'major' if error.get('severity') == 'error' else 'minor',
                  'location': {'path': loc.get('file',''), 'lines': {'begin': int(loc.get('line',0))}}
              })
      with open('gl-code-quality-report.json', 'w') as f:
          json.dump(issues, f, indent=2, ensure_ascii=False)
      print(f'Code quality report: {len(issues)} issues')
      "
    - echo "=== Generating Dashboard HTML ==="
    - |
      python3 << 'PYEOF'
      import os
      from xml.etree import ElementTree as ET
      from datetime import datetime

      tree = ET.parse('quality-report/cppcheck.xml')
      root = tree.getroot()

      issues = []
      errors = warnings = performance = style = 0
      for err in root.findall('.//error'):
          loc = err.find('location')
          if loc is None:
              continue
          sev = err.get('severity', 'warning')
          cat = err.get('id', 'unknown')
          if sev == 'error':
              errors += 1
          elif sev == 'warning':
              warnings += 1
          elif cat in ('performance', 'unusedFunction'):
              performance += 1
          else:
              style += 1
          issues.append({
              'file': loc.get('file', ''),
              'line': int(loc.get('line', 0)),
              'severity': sev,
              'category': cat,
              'message': err.get('msg', ''),
          })

      issues.sort(key=lambda x: (0 if x['severity'] == 'error' else 1 if x['severity'] == 'warning' else 2, x['file'], x['line']))
      total = len(issues)
      files_set = sorted(set(i['file'] for i in issues))
      dt = datetime.now().strftime('%Y-%m-%d %H:%M')

      html = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n'
      html += '<meta charset="UTF-8">\n'
      html += '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
      html += '<title>cpp-ai-agent Code Quality Dashboard</title>\n'
      html += '<style>\n'
      html += '*{margin:0;padding:0;box-sizing:border-box}'
      html += 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.6}'
      html += '.header{background:#161b22;border-bottom:1px solid #30363d;padding:24px 32px}'
      html += '.header h1{font-size:24px;color:#58a6ff}'
      html += '.header .sub{color:#8b949e;margin-top:4px;font-size:14px}'
      html += '.stats{display:flex;gap:20px;padding:24px 32px;flex-wrap:wrap}'
      html += '.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px 24px;min-width:120px;text-align:center}'
      html += '.stat .num{font-size:32px;font-weight:700}'
      html += '.stat .label{font-size:12px;color:#8b949e;margin-top:4px;text-transform:uppercase}'
      html += '.stat.e .num{color:#f85149}.stat.w .num{color:#d29922}.stat.p .num{color:#58a6ff}.stat.s .num{color:#8b949e}'
      html += '.main{padding:0 32px 32px}'
      html += '.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}'
      html += '.filters button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}'
      html += '.filters button:hover{background:#30363d}'
      html += '.filters button.act{background:#1f6feb;border-color:#1f6feb;color:#fff}'
      html += 'table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}'
      html += 'th{background:#21262d;padding:10px 16px;text-align:left;font-size:13px;color:#8b949e;border-bottom:1px solid #30363d}'
      html += 'td{padding:8px 16px;font-size:13px;border-bottom:1px solid #21262d}'
      html += 'tr:hover td{background:#1c2129}'
      html += '.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}'
      html += '.badge.e{background:#f8514920;color:#f85149}'
      html += '.badge.w{background:#d2992220;color:#d29922}'
      html += '.badge.s{background:#8b949e20;color:#8b949e}'
      html += '.badge.p{background:#58a6ff20;color:#58a6ff}'
      html += '.footer{text-align:center;padding:20px;color:#484f58;font-size:12px;border-top:1px solid #21262d}'
      html += '</style>\n</head>\n<body>\n'

      html += f'<div class="header"><h1>cpp-ai-agent Code Quality Dashboard</h1>'
      html += f'<div class="sub">Generated {dt} | {len(files_set)} files | {total} issues</div></div>\n'

      html += '<div class="stats">'
      html += f'<div class="stat e"><div class="num">{errors}</div><div class="label">Errors</div></div>'
      html += f'<div class="stat w"><div class="num">{warnings}</div><div class="label">Warnings</div></div>'
      html += f'<div class="stat p"><div class="num">{performance}</div><div class="label">Performance</div></div>'
      html += f'<div class="stat s"><div class="num">{style}</div><div class="label">Style</div></div>'
      html += '</div>\n<div class="main">\n'

      html += '<div class="filters">'
      html += f'<button class="act" onclick="filter(\'all\')">All ({total})</button>'
      html += f'<button onclick="filter(\'error\')">Errors ({errors})</button>'
      html += f'<button onclick="filter(\'warning\')">Warnings ({warnings})</button>'
      html += f'<button onclick="filter(\'style\')">Style ({style})</button>'
      html += f'<button onclick="filter(\'performance\')">Performance ({performance})</button>'
      html += '</div>\n'

      html += '<table id="tbl"><thead><tr><th width="55%">File</th><th width="8%">Line</th><th width="10%">Severity</th><th>Message</th></tr></thead><tbody>\n'

      for i in issues:
          sev = i['severity']
          cls = 'e' if sev == 'error' else 'w' if sev == 'warning' else 's'
          if sev not in ('error', 'warning', 'style'):
              cls = 'p'
          html += f'<tr data-s="{cls}"><td>{i["file"]}</td><td>{i["line"]}</td><td><span class="badge {cls}">{sev.upper()}</span></td><td>{i["message"]}</td></tr>\n'

      html += '</tbody></table>\n'

      if total == 0:
          html += '<div style="text-align:center;padding:60px;color:#8b949e"><div style="font-size:48px;margin-bottom:16px">&#10003;</div><h3>No Issues Found</h3><p>All scanned files passed cppcheck analysis.</p></div>'

      html += '</div>\n'
      html += '<div class="footer">cpp-ai-agent Code Quality Dashboard &middot; Powered by cppcheck &middot; GitLab CI</div>\n'
      html += '<script>'
      html += 'function filter(s){document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("act"));event.target.classList.add("act");document.querySelectorAll("#tbl tbody tr").forEach(r=>{r.style.display=s==="all"||r.dataset.s===s?"":"none"})}'
      html += '</script>\n</body>\n</html>'

      os.makedirs('public', exist_ok=True)
      with open('public/index.html', 'w', encoding='utf-8') as f:
          f.write(html)
      print(f'Dashboard generated: {total} issues ({errors}E/{warnings}W/{performance}P/{style}S)')
      PYEOF
    - echo "=== Text Report ==="
    - cat quality-report/cppcheck.txt
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - quality-report/
      - public/
    reports:
      codequality: gl-code-quality-report.json

deploy-linux:
  stage: deploy
  tags:
    - linux
  variables:
    GIT_CLEAN_FLAGS: none
  needs:
    - job: build-linux
      artifacts: false
      optional: true
    - job: test-linux
      artifacts: false
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "=== Packaging Linux release ==="
    - cd build/linux-gcc-release
    - tar -czf ai-agent-linux.tar.gz ai-agent 2>/dev/null || true
    - ls -lh ai-agent-linux.tar.gz 2>/dev/null || echo "No binary to package"
    - echo "=== Ansible deploy (stub) ==="
    - ansible-playbook -i ansible/inventory.ini ansible/deploy.yml --extra-vars "version=${CI_COMMIT_SHORT_SHA}" 2>/dev/null || echo "Ansible deploy skipped (not configured)"
  artifacts:
    paths:
      - build/linux-gcc-release/ai-agent-linux.tar.gz
    expire_in: 30 days


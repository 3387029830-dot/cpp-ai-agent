sonar.projectKey=cpp-ai-agent
sonar.projectName=cpp-ai-agent
sonar.projectVersion=0.2.0

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.exclusions=build/**,vcpkg_installed/**,logs/**,docs/**,第一周周报/**,config/**,examples/**

# ──────────────────────────────────────────────────
# SonarQube 配置 — cpp-ai-agent
# 使用 sonar-cxx 社区插件 + cppcheck（免费方案）
# ──────────────────────────────────────────────────

# 项目标识
sonar.projectKey=cpp-ai-agent
sonar.projectName=cpp-ai-agent
sonar.projectVersion=0.2.0

# 扫描范围
sonar.sources=src
sonar.tests=tests
sonar.inclusions=**/*.cpp,**/*.h,**/*.hpp
sonar.exclusions=build/**,vcpkg_installed/**,logs/**,docs/**,第一周周报/**,config/**,examples/**
sonar.test.exclusions=build/**,vcpkg_installed/**
sonar.sourceEncoding=UTF-8

# cppcheck 报告路径
sonar.cxx.cppcheck.reportPath=cppcheck-report.xml
